# assets.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Sentrix Asset Register
#
# Fields per asset:
#   hostname        : Human-readable name (for display only)
#   criticality     : 0.0–1.0  (1.0 = most critical)
#   network_exposure: 0.0–1.0  (1.0 = internet-facing)
#   data_sensitivity: 0.0–1.0  (1.0 = contains PII/secrets)
#   environment     : production | staging | development | lab
#   owner           : Team or individual accountable for the asset
#   tags            : List of labels (used for crisis-scope matching)
#
# Unknown assets use default_asset values below.
#
# This file is hot-reloaded alongside rules — no engine restart required.
# ─────────────────────────────────────────────────────────────────────────────

default_asset:
  hostname:         "unknown"
  criticality:      0.3
  network_exposure: 0.3
  data_sensitivity: 0.3
  environment:      "unknown"
  owner:            "unassigned"
  tags:             []

